name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v8
        with:
          stale-issue-message: 'This issue has been marked as stale because it has not had recent activity for 60 days. It will be closed in 7 days if no further activity occurs.'
          stale-pr-message: 'This PR has been marked as stale because it has not had recent activity for 60 days. It will be closed in 7 days if no further activity occurs.'
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
