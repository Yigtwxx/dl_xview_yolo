name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v8
        with:
          stale-issue-message: 'Bu kayıt (issue), 60 gündür hiçbir etkinlik göstermediği için bekleme durumuna alınmıştır ve etkinlik olmazsa 7 gün içinde kapatılacaktır.'
          stale-pr-message: 'Bu PR, 60 gündür hiçbir etkinlik göstermediği için bekleme durumuna alınmıştır ve etkinlik olmazsa 7 gün içinde kapatılacaktır.'
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
