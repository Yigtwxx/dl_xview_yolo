name: Python Code Linter

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        
    - name: Lint with flake8 (No error code returned)
      run: |
        # This step will not return an error (exit-zero). It checks code quality without breaking the PR.
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exit-zero
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exit-zero
